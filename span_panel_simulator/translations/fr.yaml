configuration:
  config_file:
    name: Fichier de configuration
    description: Chemin vers le fichier YAML de simulation (relatif à /config)
  tick_interval:
    name: Intervalle de mise à jour
    description: Secondes entre les mises à jour de la simulation
  log_level:
    name: Niveau de journalisation
