services:
  span-simulator:
    build: .
    ports:
      - "8883:8883"    # MQTTS
      - "9001:9001"    # WS
      - "9002:9002"    # WSS
      - "443:443"      # HTTPS (bootstrap + admin)
    volumes:
      - ./configs:/app/configs:ro
    environment:
      - CONFIG_DIR=/app/configs
      - TICK_INTERVAL=1.0
      - LOG_LEVEL=INFO
