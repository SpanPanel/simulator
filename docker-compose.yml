services:
  span-simulator:
    build: .
    ports:
      - "8883:8883"    # MQTTS
      - "9001:9001"    # WS
      - "9002:9002"    # WSS
      - "443:443"      # HTTPS (bootstrap)
    volumes:
      - ./configs:/app/configs:ro
    environment:
      - SIMULATION_CONFIG=/app/configs/simulation_config_32_circuit.yaml
      - PANEL_SERIAL=SPAN-SIM-001
      - TICK_INTERVAL=1.0
      - LOG_LEVEL=INFO
