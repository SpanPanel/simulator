<section class="card panels-card">
  <div class="panels-header">
    <h3>Panels</h3>
    <span class="running-count">{{ panels | length }} config{{ 's' if panels | length != 1 else '' }}</span>
    <form method="post" enctype="multipart/form-data"
          hx-post="import" hx-target="#main-content" hx-encoding="multipart/form-data"
          hx-disabled-elt="find label"
          style="display:inline; margin-left:auto">
      <label class="btn btn-sm btn-secondary">
        Import
        <input type="file" name="file" accept=".yaml,.yml" hidden
               onchange="this.closest('form').dispatchEvent(new Event('submit', {bubbles:true}))">
      </label>
    </form>
  </div>
  <div id="panels-list" hx-get="panels-list" hx-trigger="every 5s, refreshPanels from:body" hx-swap="innerHTML">
    {% include "partials/panels_list_rows.html" %}
  </div>
</section>
