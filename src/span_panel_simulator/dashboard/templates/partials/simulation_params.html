<div class="card">
  <h2>Simulation Parameters</h2>
  <form hx-put="sim-params" hx-target="#sim-params-section" hx-swap="innerHTML">
    <div class="form-row">
      <label>Interval (s):
        <input type="number" name="update_interval" value="{{ sim_params.update_interval }}" min="1" max="60" style="width:4em">
      </label>
      <label>Acceleration:
        <input type="number" name="time_acceleration" value="{{ sim_params.time_acceleration }}" min="0.1" max="100" step="0.1" style="width:4em">
      </label>
      <label>Noise:
        <input type="number" name="noise_factor" value="{{ sim_params.noise_factor }}" min="0" max="1" step="0.01" style="width:4em">
      </label>
      <label>
        <input type="checkbox" name="enable_realistic_behaviors" value="true"
               {{ 'checked' if sim_params.enable_realistic_behaviors }}>
        Realistic behaviors
      </label>
      <button type="submit" class="btn btn-sm">Update</button>
    </div>
  </form>
</div>
