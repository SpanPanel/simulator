<fieldset class="profile-editor">
  <legend>24-Hour Profile</legend>
  <div class="preset-selector" id="preset-form-{{ entity.id }}">
    <select name="preset" class="preset-dropdown"
            onchange="toggleRandomParams(this, '{{ entity.id }}')">
      <option value="">-- Select Preset --</option>
      {% for key, label in preset_labels.items() %}
      <option value="{{ key }}">{{ label }}</option>
      {% endfor %}
    </select>
    <span class="random-params" id="random-params-{{ entity.id }}" style="display:none">
      <label>from <input type="number" name="start_hour" value="0" min="0" max="23" class="hour-input"></label>
      <label>to <input type="number" name="end_hour" value="24" min="0" max="24" class="hour-input"></label>
    </span>
    <button type="button" class="btn btn-sm"
            hx-post="entities/{{ entity.id }}/profile/preset"
            hx-target="#profile-{{ entity.id }}"
            hx-swap="innerHTML"
            hx-include="#preset-form-{{ entity.id }}"
            hx-disabled-elt="this">Apply</button>
  </div>
  <div class="day-picker" id="days-{{ entity.id }}">
    <span class="day-picker-label">Active Days</span>
    <input type="hidden" name="days_submitted" value="1">
    {% for d, label in [(0,'Mo'),(1,'Tu'),(2,'We'),(3,'Th'),(4,'Fr'),(5,'Sa'),(6,'Su')] %}
    <label class="day-toggle">
      <input type="checkbox" name="day_{{ d }}" value="1"
             {% if d in active_days or not active_days %}checked{% endif %}
             hx-put="entities/{{ entity.id }}/active-days"
             hx-include="#days-{{ entity.id }}"
             hx-swap="none">
      {{ label }}
    </label>
    {% endfor %}
  </div>
  <form hx-put="entities/{{ entity.id }}/profile" hx-target="#profile-{{ entity.id }}" hx-swap="innerHTML"
        hx-disabled-elt="find button">
    <div class="profile-grid">
      {% for h in range(24) %}
      <div class="profile-hour">
        <label>{{ '%02d' % h }}:00</label>
        <input type="number" name="hour_{{ h }}" value="{{ profile.get(h, 0.0) }}"
               min="0" max="1" step="0.01" style="width:4em">
        <div class="bar" style="height: {{ (profile.get(h, 0.0) * 40)|int }}px"></div>
      </div>
      {% endfor %}
    </div>
    <button type="submit" class="btn btn-sm">Save Profile</button>
  </form>
</fieldset>
