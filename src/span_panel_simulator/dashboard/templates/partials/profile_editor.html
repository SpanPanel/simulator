<fieldset class="profile-editor">
  <legend>24-Hour Profile</legend>
  <div class="preset-buttons">
    {% for key, label in preset_labels.items() %}
      {% if key == 'random' %}
      <span class="random-preset-group">
        <button type="button" class="btn btn-sm"
                hx-post="entities/{{ entity.id }}/profile/preset"
                hx-target="#profile-{{ entity.id }}"
                hx-swap="innerHTML"
                hx-include="#random-params-{{ entity.id }}"
                hx-vals='{"preset": "random"}'>{{ label }}</button>
        <span class="random-params" id="random-params-{{ entity.id }}">
          <label>from <input type="number" name="start_hour" value="0" min="0" max="23" class="hour-input"></label>
          <label>to <input type="number" name="end_hour" value="24" min="0" max="24" class="hour-input"></label>
        </span>
      </span>
      {% else %}
      <button type="button" class="btn btn-sm"
              hx-post="entities/{{ entity.id }}/profile/preset"
              hx-target="#profile-{{ entity.id }}"
              hx-swap="innerHTML"
              hx-vals='{"preset": "{{ key }}"}'>{{ label }}</button>
      {% endif %}
    {% endfor %}
  </div>
  <form hx-put="entities/{{ entity.id }}/profile" hx-target="#profile-{{ entity.id }}" hx-swap="innerHTML">
    <div class="profile-grid">
      {% for h in range(24) %}
      <div class="profile-hour">
        <label>{{ '%02d' % h }}:00</label>
        <input type="number" name="hour_{{ h }}" value="{{ profile.get(h, 0.0) }}"
               min="0" max="1" step="0.01" style="width:4em">
        <div class="bar" style="height: {{ (profile.get(h, 0.0) * 40)|int }}px"></div>
      </div>
      {% endfor %}
    </div>
    <button type="submit" class="btn btn-sm">Save Profile</button>
  </form>
</fieldset>
