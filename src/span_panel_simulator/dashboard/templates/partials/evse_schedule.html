<div class="evse-schedule" id="evse-schedule-{{ e.id }}">
  <h4>Charging Schedule</h4>

  <div class="preset-selector" id="evse-preset-form-{{ e.id }}">
    <select name="preset" class="preset-dropdown">
      <option value="">-- Select Preset --</option>
      {% for key, label in evse_preset_labels.items() %}
      <option value="{{ key }}" {{ 'selected' if evse_active_preset == key }}>{{ label }}</option>
      {% endfor %}
    </select>
    <button type="button" class="btn btn-sm"
            hx-post="entities/{{ e.id }}/evse-schedule/preset"
            hx-target="#evse-schedule-{{ e.id }}" hx-swap="outerHTML"
            hx-include="#evse-preset-form-{{ e.id }}">Apply</button>
  </div>

  <div class="day-picker" id="days-{{ e.id }}">
    <span class="day-picker-label">Active Days</span>
    <input type="hidden" name="days_submitted" value="1">
    {% for d, label in [(0,'Mo'),(1,'Tu'),(2,'We'),(3,'Th'),(4,'Fr'),(5,'Sa'),(6,'Su')] %}
    <label class="day-toggle">
      <input type="checkbox" name="day_{{ d }}" value="1"
             {% if d in active_days or not active_days %}checked{% endif %}
             hx-put="entities/{{ e.id }}/active-days"
             hx-include="#days-{{ e.id }}"
             hx-swap="none">
      {{ label }}
    </label>
    {% endfor %}
  </div>

  <form hx-put="entities/{{ e.id }}/evse-schedule"
        hx-target="#evse-schedule-{{ e.id }}" hx-swap="outerHTML">
    <div class="form-row" style="margin:0.5rem 0">
      <label>Start:
        <select name="charge_start" style="width:5.5em">
          {% for h in range(24) %}
          <option value="{{ h }}" {{ 'selected' if h == evse_start }}>{{ '%02d' | format(h) }}:00</option>
          {% endfor %}
        </select>
      </label>
      <label>Duration:
        <select name="charge_duration" style="width:4.5em">
          {% for d in range(1, 25) %}
          <option value="{{ d }}" {{ 'selected' if d == evse_duration }}>{{ d }}h</option>
          {% endfor %}
        </select>
      </label>
      <button type="submit" class="btn btn-sm">Apply</button>
    </div>
  </form>

  <div class="evse-timeline">
    {% for h in range(24) %}
    <div class="evse-hour-cell {{ 'charging' if evse_profile[h] > 0 }}">
      <div class="evse-hour-bar"></div>
      <span class="evse-hour-num">{{ h }}</span>
    </div>
    {% endfor %}
  </div>
</div>
