<div class="card">
  <h2>Panel Config</h2>
  <form hx-put="panel-config" hx-target="#panel-config-section" hx-swap="innerHTML">
    <div class="form-row">
      <label>Serial:
        <input type="text" name="serial_number" value="{{ panel_config.serial_number }}" size="20">
      </label>
      <label>Tabs:
        <input type="number" name="total_tabs" value="{{ panel_config.total_tabs }}" min="1" max="40" style="width:4em">
      </label>
      <label>Main Size (A):
        <input type="number" name="main_size" value="{{ panel_config.main_size }}" min="100" max="400" style="width:4em">
      </label>
      <button type="submit" class="btn btn-sm">Update</button>
    </div>
  </form>
</div>
