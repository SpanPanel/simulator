<!DOCTYPE html>
<html lang="en" data-theme="system">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SPAN Panel Simulator Dashboard</title>
  <link rel="stylesheet" href="{{ static_url }}/dashboard.css">
  <script src="{{ static_url }}/htmx.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/nouislider@15.8.1/dist/nouislider.min.css">
  <script src="https://cdn.jsdelivr.net/npm/nouislider@15.8.1/dist/nouislider.min.js"></script>
</head>
<body>
  <header>
    <h1>SPAN Panel Simulator Dashboard</h1>
    <div class="header-actions">
      <select id="theme-select" class="theme-select" title="Theme">
        <option value="system">System</option>
        <option value="light">Light</option>
        <option value="dark">Dark</option>
      </select>
      <label class="date-selector">
        Month:
        <select id="sim-month" name="month">
          {% for m in range(1, 13) %}
          <option value="{{ m }}" {{ 'selected' if m == 3 }}>{{ m }}</option>
          {% endfor %}
        </select>
      </label>
      <label class="date-selector">
        Day:
        <input type="number" id="sim-day" name="day" value="15" min="1" max="31" style="width:3em">
      </label>
    </div>
  </header>
  <div id="flash-area"></div>
  <main id="main-content">
    {% block content %}{% endblock %}
  </main>
  <script>
    // Make month/day available to HTMX requests
    document.body.addEventListener('htmx:configRequest', function(evt) {
      var month = document.getElementById('sim-month');
      var day = document.getElementById('sim-day');
      if (month && day) {
        evt.detail.parameters['month'] = month.value;
        evt.detail.parameters['day'] = day.value;
      }
    });

    // Theme switcher
    (function() {
      var sel = document.getElementById('theme-select');
      var saved = localStorage.getItem('theme') || 'system';
      sel.value = saved;
      document.documentElement.setAttribute('data-theme', saved);

      sel.addEventListener('change', function() {
        var t = sel.value;
        document.documentElement.setAttribute('data-theme', t);
        localStorage.setItem('theme', t);
      });
    })();
  </script>
</body>
</html>
