<!DOCTYPE html>
<html lang="en" data-theme="system">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SPAN Panel Simulator Dashboard</title>
  <link rel="stylesheet" href="{{ static_url }}/dashboard.css">
  <script src="{{ static_url }}/htmx.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/nouislider@15.8.1/dist/nouislider.min.css">
  <script src="https://cdn.jsdelivr.net/npm/nouislider@15.8.1/dist/nouislider.min.js"></script>
</head>
<body>
  <header>
    <h1>SPAN Panel Simulator Dashboard</h1>
    <div class="header-actions">
      <select id="theme-select" class="theme-select" title="Theme">
        <option value="system">System</option>
        <option value="light">Light</option>
        <option value="dark">Dark</option>
      </select>
    </div>
  </header>
  <div id="flash-area"></div>
  <main id="main-content">
    {% block content %}{% endblock %}
  </main>
  <script>
    // Make month/day available to HTMX requests (derived from date slider)
    document.body.addEventListener('htmx:configRequest', function(evt) {
      if (window.getSimDate) {
        var d = window.getSimDate();
        evt.detail.parameters['month'] = String(d.month);
        evt.detail.parameters['day'] = String(d.day);
      }
    });

    // Toggle random preset parameters visibility
    function toggleRandomParams(sel, entityId) {
      var el = document.getElementById('random-params-' + entityId);
      if (el) el.style.display = sel.value === 'random' ? 'inline-flex' : 'none';
    }

    // Theme switcher
    (function() {
      var sel = document.getElementById('theme-select');
      var saved = localStorage.getItem('theme') || 'system';
      sel.value = saved;
      document.documentElement.setAttribute('data-theme', saved);

      sel.addEventListener('change', function() {
        var t = sel.value;
        document.documentElement.setAttribute('data-theme', t);
        localStorage.setItem('theme', t);
      });
    })();
  </script>
</body>
</html>
