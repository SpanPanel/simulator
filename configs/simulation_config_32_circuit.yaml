        18: 1.0
        19: 0.8
        20: 0.3
        21: 0.0
        22: 0.0
        23: 0.0

  # Refrigerator with compressor cycling
  refrigerator:
    energy_profile:
      mode: "consumer"
      power_range: [50.0, 200.0]
      typical_power: 120.0
      power_variation: 0.2
    relay_behavior: "non_controllable"
    priority: "NEVER"
    breaker_rating: 20
    cycling_pattern:
      on_duration: 600    # 10 minutes
      off_duration: 1800  # 30 minutes

  # EV charger (SPAN Drive) with smart grid response
  ev_charger:
    energy_profile:
      mode: "consumer"
      power_range: [0.0, 11500.0]
      typical_power: 7200.0  # Level 2 charging (240V @ 30A)
      power_variation: 0.05
    relay_behavior: "controllable"
    priority: "OFF_GRID"
    breaker_rating: 50
    device_type: "evse"  # Generates EVSE (SPAN Drive) snapshot
    smart_behavior:
      responds_to_grid: true
      max_power_reduction: 0.6  # Can reduce to 40% during grid stress
    time_of_day_profile:
      enabled: true
      hour_factors:
        0: 1.0
        1: 1.0
        2: 1.0
        3: 1.0
        4: 1.0
        5: 1.0
        6: 0.0
