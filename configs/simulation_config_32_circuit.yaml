        15: 1.0
        16: 1.0
        17: 0.5
        18: 0.0
        19: 0.0
        20: 0.0
        21: 0.0
        22: 0.0
        23: 0.0

  # Oven/range — thermostat cycling, dinner-centric usage
  oven_range:
    energy_profile:
      mode: "consumer"
      power_range: [0.0, 5000.0]
      typical_power: 2000.0
      power_variation: 0.2
    relay_behavior: "controllable"
    priority: "OFF_GRID"
    breaker_rating: 40
    cycling_pattern:
      on_duration: 600
      off_duration: 600
    time_of_day_profile:
      enabled: true
      hour_factors:
        0: 0.0
        1: 0.0
        2: 0.0
