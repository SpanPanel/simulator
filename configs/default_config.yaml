# Default simulator configuration: 40-tab residential panel
# Includes 2 SPAN Drives (EV chargers), battery storage, and solar PV
# All 40 tabs are mapped — no unmapped tab sensors will appear

panel_config:
  serial_number: "SPAN-SIM-40T-001"
  total_tabs: 40
  main_size: 200

circuit_templates:
  # --- Lighting ---
  lighting:
    energy_profile:
      mode: "consumer"
      power_range: [0.0, 500.0]
      typical_power: 80.0
      power_variation: 0.1
    relay_behavior: "controllable"
    priority: "NEVER"
    time_of_day_profile:
      enabled: true
      peak_hours: [18, 19, 20, 21, 22]

  exterior_lighting:
    energy_profile:
      mode: "consumer"
      power_range: [0.0, 300.0]
      typical_power: 60.0
      power_variation: 0.1
    relay_behavior: "controllable"
    priority: "OFF_GRID"
    time_of_day_profile:
      enabled: true
      peak_hours: [18, 19, 20, 21, 22, 23, 0, 1, 2, 3, 4, 5]

  # --- Outlets ---
  outlets:
    energy_profile:
      mode: "consumer"
      power_range: [0.0, 1800.0]
      typical_power: 150.0
      power_variation: 0.4
    relay_behavior: "controllable"
    priority: "NEVER"

  kitchen_outlets:
    energy_profile:
      mode: "consumer"
      power_range: [0.0, 2400.0]
      typical_power: 300.0
      power_variation: 0.5
    relay_behavior: "controllable"
    priority: "NEVER"

  # --- Major appliances ---
  refrigerator:
    energy_profile:
      mode: "consumer"
      power_range: [50.0, 200.0]
      typical_power: 120.0
      power_variation: 0.2
    relay_behavior: "non_controllable"
    priority: "NEVER"
    cycling_pattern:
      on_duration: 600
      off_duration: 1800

  large_appliance:
    energy_profile:
      mode: "consumer"
      power_range: [0.0, 2500.0]
      typical_power: 1200.0
      power_variation: 0.2
    relay_behavior: "controllable"
    priority: "OFF_GRID"

  # --- HVAC ---
  hvac:
    energy_profile:
      mode: "consumer"
      power_range: [0.0, 3500.0]
      typical_power: 2800.0
      power_variation: 0.1
    relay_behavior: "controllable"
    priority: "NEVER"
    cycling_pattern:
      on_duration: 1200
      off_duration: 2400

  heat_pump:
    energy_profile:
      mode: "consumer"
      power_range: [500.0, 4000.0]
      typical_power: 2800.0
      power_variation: 0.25
    relay_behavior: "controllable"
    priority: "OFF_GRID"
    cycling_pattern:
      on_duration: 900
      off_duration: 1800

  # --- SPAN Drive (EV Charger) ---
  span_drive:
    energy_profile:
      mode: "consumer"
      power_range: [0.0, 11500.0]
      typical_power: 7200.0
      power_variation: 0.05
    relay_behavior: "controllable"
    priority: "OFF_GRID"
    device_type: "evse"
    smart_behavior:
      responds_to_grid: true
      max_power_reduction: 0.6

  # --- Solar PV ---
  solar:
    energy_profile:
      mode: "producer"
      power_range: [-5000.0, 0.0]
      typical_power: -3000.0
      power_variation: 0.25
      efficiency: 0.85
    relay_behavior: "non_controllable"
    priority: "NEVER"
    device_type: "pv"
    time_of_day_profile:
      enabled: true
      peak_hours: [11, 12, 13, 14, 15]
      peak_multiplier: 1.0
      off_peak_multiplier: 0.0
      hourly_multipliers:
        6: 0.1
        7: 0.2
        8: 0.4
        9: 0.6
        10: 0.8
        11: 1.0
        12: 1.0
        13: 1.0
        14: 1.0
        15: 1.0
        16: 0.8
        17: 0.6
        18: 0.4
        19: 0.2
        20: 0.0

  # --- Battery ---
  battery:
    energy_profile:
      mode: "bidirectional"
      power_range: [-5000.0, 5000.0]
      typical_power: 0.0
      power_variation: 0.02
      efficiency: 0.95
    relay_behavior: "controllable"
    priority: "NEVER"
    battery_behavior:
      enabled: true
      charge_power: 3500.0
      discharge_power: -3500.0
      idle_power: 0.0

  # --- Pool / Hot tub ---
  pool:
    energy_profile:
      mode: "consumer"
      power_range: [0.0, 1200.0]
      typical_power: 800.0
      power_variation: 0.1
    relay_behavior: "controllable"
    priority: "OFF_GRID"
    cycling_pattern:
      on_duration: 7200
      off_duration: 14400

  # --- Always-on base load ---
  always_on:
    energy_profile:
      mode: "consumer"
      power_range: [40.0, 100.0]
      typical_power: 60.0
      power_variation: 0.1
    relay_behavior: "controllable"
    priority: "NEVER"

circuits:
  # --- Lighting (tabs 1-6, all 120V single-pole) ---
  - id: "master_bedroom_lights"
    name: "Master Bedroom Lights"
    template: "lighting"
    tabs: [1]
    overrides:
      typical_power: 40.0

  - id: "living_room_lights"
    name: "Living Room Lights"
    template: "lighting"
    tabs: [2]
    overrides:
      typical_power: 50.0

  - id: "kitchen_lights"
    name: "Kitchen Lights"
    template: "lighting"
    tabs: [3]
    overrides:
      typical_power: 45.0

  - id: "bedroom_lights"
    name: "Bedroom Lights"
    template: "lighting"
    tabs: [4]

  - id: "bathroom_lights"
    name: "Bathroom Lights"
    template: "lighting"
    tabs: [5]
    overrides:
      typical_power: 30.0

  - id: "exterior_lights"
    name: "Exterior Lights"
    template: "exterior_lighting"
    tabs: [6]

  # --- Outlets (tabs 7-14, all 120V single-pole) ---
  - id: "master_bedroom_outlets"
    name: "Master Bedroom Outlets"
    template: "outlets"
    tabs: [7]

  - id: "living_room_outlets"
    name: "Living Room Outlets"
    template: "outlets"
    tabs: [8]
    overrides:
      typical_power: 250.0

  - id: "kitchen_outlets_1"
    name: "Kitchen Outlets (Counter)"
    template: "kitchen_outlets"
    tabs: [9]

  - id: "kitchen_outlets_2"
    name: "Kitchen Outlets (Island)"
    template: "kitchen_outlets"
    tabs: [10]

  - id: "office_outlets"
    name: "Office Outlets"
    template: "outlets"
    tabs: [11]
    overrides:
      typical_power: 300.0

  - id: "garage_outlets"
    name: "Garage Outlets"
    template: "outlets"
    tabs: [12]

  - id: "laundry_outlets"
    name: "Laundry Room Outlets"
    template: "outlets"
    tabs: [13]

  - id: "guest_room_outlets"
    name: "Guest Room Outlets"
    template: "outlets"
    tabs: [14]

  # --- Major appliances (tabs 15-24, mix of 120V and 240V) ---
  - id: "refrigerator"
    name: "Refrigerator"
    template: "refrigerator"
    tabs: [15]

  - id: "dishwasher"
    name: "Dishwasher"
    template: "large_appliance"
    tabs: [16]
    overrides:
      typical_power: 1200.0

  - id: "washing_machine"
    name: "Washing Machine"
    template: "large_appliance"
    tabs: [17]
    overrides:
      typical_power: 1000.0

  - id: "dryer"
    name: "Electric Dryer"
    template: "large_appliance"
    tabs: [18, 19]          # 240V
    overrides:
      typical_power: 3000.0
      power_range: [0.0, 4500.0]

  - id: "oven"
    name: "Electric Oven/Range"
    template: "large_appliance"
    tabs: [20, 21]          # 240V
    overrides:
      typical_power: 2500.0
      power_range: [0.0, 4000.0]

  - id: "microwave"
    name: "Microwave"
    template: "large_appliance"
    tabs: [22]
    overrides:
      typical_power: 1000.0

  - id: "garbage_disposal"
    name: "Garbage Disposal"
    template: "always_on"
    tabs: [23]
    overrides:
      typical_power: 0.0
      power_range: [0.0, 500.0]

  - id: "freezer"
    name: "Chest Freezer"
    template: "refrigerator"
    tabs: [24]
    overrides:
      typical_power: 80.0

  # --- HVAC (tabs 25-28, 240V) ---
  - id: "main_hvac"
    name: "Main HVAC"
    template: "hvac"
    tabs: [25, 26]          # 240V

  - id: "heat_pump"
    name: "Heat Pump"
    template: "heat_pump"
    tabs: [27, 28]          # 240V

  # --- Pool equipment (tab 29) ---
  - id: "pool_pump"
    name: "Pool Pump"
    template: "pool"
    tabs: [29]

  # --- Water heater (tabs 30-31, 240V) ---
  - id: "water_heater"
    name: "Water Heater"
    template: "large_appliance"
    tabs: [30, 31]          # 240V
    overrides:
      typical_power: 4000.0
      power_range: [0.0, 4500.0]

  # --- SPAN Drive 1: Garage (tabs 32-33, 240V) ---
  - id: "span_drive_garage"
    name: "SPAN Drive - Garage"
    template: "span_drive"
    tabs: [32, 33]          # 240V Level 2

  # --- SPAN Drive 2: Driveway (tabs 34-35, 240V) ---
  - id: "span_drive_driveway"
    name: "SPAN Drive - Driveway"
    template: "span_drive"
    tabs: [34, 35]          # 240V Level 2

  # --- Solar PV (tabs 36-37, 240V) ---
  - id: "solar_inverter"
    name: "Solar Inverter"
    template: "solar"
    tabs: [36, 37]          # 240V

  # --- Battery (tabs 38-39, 240V) ---
  - id: "battery_storage"
    name: "Battery Storage"
    template: "battery"
    tabs: [38, 39]          # 240V

  # --- Smoke / security (tab 40) ---
  - id: "smoke_detectors"
    name: "Smoke Detectors"
    template: "always_on"
    tabs: [40]
    overrides:
      typical_power: 5.0
      power_range: [3.0, 10.0]

unmapped_tabs: []

simulation_params:
  update_interval: 5
  time_acceleration: 1.0
  noise_factor: 0.02
  enable_realistic_behaviors: true
