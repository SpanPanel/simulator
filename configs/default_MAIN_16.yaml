# Simple test configuration with minimal circuits
# Includes solar + battery for basic DER testing

panel_config:
  serial_number: "sim-16t-test-001"
  total_tabs: 16
  main_size: 100
  latitude: 37.7
  longitude: -122.4

circuit_templates:
  lighting:
    energy_profile:
      mode: "consumer"
      power_range: [5.0, 50.0]
      typical_power: 25.0
      power_variation: 0.1
    relay_behavior: "controllable"
    priority: "NEVER"
    breaker_rating: 15

  outlets:
    energy_profile:
      mode: "consumer"
      power_range: [0.0, 1800.0]
      typical_power: 150.0
      power_variation: 0.3
    relay_behavior: "controllable"
    priority: "NEVER"
    breaker_rating: 15

  hvac:
    energy_profile:
      mode: "consumer"
      power_range: [0.0, 3000.0]
      typical_power: 2000.0
      power_variation: 0.15
    relay_behavior: "controllable"
    priority: "OFF_GRID"
    breaker_rating: 30

  solar:
    energy_profile:
      mode: "producer"
      power_range: [-5000.0, 0.0]
      typical_power: -2500.0
      power_variation: 0.2
      efficiency: 0.85
      nameplate_capacity_w: 5000.0
    relay_behavior: "non_controllable"
    priority: "NEVER"
    device_type: "pv"
    breaker_rating: 30

  battery:
    energy_profile:
      mode: "bidirectional"
      power_range: [-5000.0, 5000.0]
      typical_power: 0.0
      power_variation: 0.02
      efficiency: 0.95
    relay_behavior: "controllable"
    priority: "NEVER"
    breaker_rating: 40
    battery_behavior:
      enabled: true
      nameplate_capacity_kwh: 13.5
      backup_reserve_pct: 20.0
      charge_mode: "solar-gen"
      max_charge_power: 3500.0
      max_discharge_power: 3500.0
      charge_hours: [8, 9, 10, 11, 12, 13, 14, 15]
      discharge_hours: [16, 17, 18, 19, 20, 21, 22]
      idle_hours: [0, 1, 2, 3, 4, 5, 6, 7, 23]

circuits:
  - id: "living_room_lights"
    name: "Living Room Lights"
    template: "lighting"
    tabs: [1]

  - id: "kitchen_lights"
    name: "Kitchen Lights"
    template: "lighting"
    tabs: [2]

  - id: "kitchen_outlets"
    name: "Kitchen Outlets"
    template: "outlets"
    tabs: [3]

  - id: "bedroom_outlets"
    name: "Bedroom Outlets"
    template: "outlets"
    tabs: [4]

  - id: "main_hvac"
    name: "Main HVAC"
    template: "hvac"
    tabs: [5, 7]

  - id: "solar_inverter"
    name: "Solar Inverter"
    template: "solar"
    tabs: [6, 8]

  - id: "battery_storage"
    name: "Battery Storage"
    template: "battery"
    tabs: [9, 11]

unmapped_tabs: []

simulation_params:
  update_interval: 5
  time_acceleration: 1.0
  noise_factor: 0.02
  enable_realistic_behaviors: true
