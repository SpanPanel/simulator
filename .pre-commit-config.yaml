repos:
  - repo: local
    hooks:
      - id: sync-version
        name: sync-version
        entry: scripts/sync-version.sh
        language: script
        files: '(pyproject\.toml|__init__\.py|config\.yaml|Dockerfile)$'
        pass_filenames: false

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.6
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        args: [--strict]
        additional_dependencies:
          - aiomqtt>=2.0.0
          - aiohttp>=3.9.0
          - aiohttp-jinja2>=1.6
          - jinja2>=3.1.0
          - cryptography>=42.0.0
          - pyyaml>=6.0
          - zeroconf>=0.131.0
          - types-PyYAML
          - types-aiofiles
        pass_filenames: false
        entry: mypy --strict src/span_panel_simulator

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
